<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Reuse+</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/faveicon-reuseMais.png" type="image/x-icon">
</head>

<body class="bg-black text-white">

    <div class="navbar navbar-expand-lg justify-content-center navbar-dark bg-dark" id="navBar-cadastro">
        <button class="btn btn-outline-success m-1" href="index.html" id="btn-home">Home</button>
        <button class="btn btn-outline-light m-1" href="principal.html" id="btn-principal">Principal</button>
        <button class="btn btn-outline-info m-1" href="about.html" id="btn-sobre">Sobre</button>
    </div>
    <main>

        <div class="container auth-page d-flex align-items-center justify-content-center mt-2">
            <div class="auth-card p-3 rounded-4" style="max-width: 520px; max-height: 50%;">
                <div class="text-center mb-4">
                    <img src="assets/logo-reuseMais.png" alt="Reuse+" class="login-logo mb-3" style="max-width: 90px;">
                    <h2 class="auth-title mb-2">Cadastro</h2>
                    <p class="auth-subtitle text-muted mb-0">Crie sua conta para começar a reutilizar itens de forma
                        responsável.</p>
                </div>
                <form id="formCadastro" class="auth-form">
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Usuário</label>
                        <input type="text" class="form-control" placeholder="Crie seu usuário"
                            title="Digite seu email ou usuário" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Email</label>
                        <input type="email" class="form-control" placeholder="Digite seu email" title="Digite seu email"
                            required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Senha</label>
                        <input type="password" class="form-control" placeholder="Digite sua senha"
                            title="Digite sua senha" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Confirme sua senha</label>
                        <input type="password" class="form-control" placeholder="Confirme sua senha"
                            title="Digite sua senha" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
                    <p class="text-center mt-3 text-muted mb-1">Já possue uma conta?</p>
                    <a href="login.html" class="d-block text-center text-info fs-6">Entrar</a>
                </form>
                <div id="msgCadastro" class="mt-3"></div>
            </div>
        </div>
    </main>

    <footer class="footer text-center mb-1 fs-5">
        <small>© <span id="currentYear"></span> Reuse+. Todos os direitos reservados.</small>
    </footer>
</body>

<script src="js/app.js"></script>
<script src="Js/cadastro.js"></script>

</html>
