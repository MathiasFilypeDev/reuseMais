<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recebimento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/faveicon-reuseMais.png" type="image/x-icon">
</head>

<body class="bg-light">
    <div class="navbar navbar-expand-lg justify-content-center navbar-dark bg-dark" id="navBar-recebimento">
        <button class="btn btn-outline-success m-1" href="index.html">Home</button>
        <button class="btn btn-outline-light m-1" href="principal.html">Principal</button>
        <button class="btn btn-outline-info m-1" href="about.html">Sobre</button>
    </div>
    <div class="container mt-5">
        <div class="card p-4">
            <h2 class="mb-4">Detalhes do interesse</h2>
            <div id="itemInfo" class="mb-4"></div>
            <div id="donationMessage" class="alert alert-info mb-3">
                As propostas ficam registradas e o dono do item poderá escolher a melhor oferta.
            </div>
            <form id="recebimentoForm">
                <div class="mb-3">
                    <label for="selectQuantity" class="form-label">Quantidade a retirar</label>
                    <select class="form-select" id="selectQuantity" required>
                        <option value="">Selecione a quantidade</option>
                    </select>
                </div>
                <div id="quantityMessage" class="alert alert-secondary d-none"></div>
                <div class="mb-3 mt-3">
                    <label for="selectOferta" class="form-label">Tipo de proposta</label>
                    <select class="form-select" id="selectOferta" required>
                        <option value="">Selecione a proposta</option>
                        <option value="pago">Tenho interesse e pago pelo item</option>
                        <option value="retirar">Posso retirar no local sem custo</option>
                        <option value="cobrar">Cobro para retirar e dar destino</option>
                    </select>
                </div>
                <div class="mb-3 d-none" id="offerValueGroup">
                    <label for="offerValue" class="form-label">Valor da proposta (R$)</label>
                    <input type="number" class="form-control" id="offerValue" min="0" step="0.01" placeholder="0,00">
                </div>
                <button type="submit" class="btn btn-primary mt-3">Enviar proposta</button>
            </form>
        </div>
    </div>

    <footer class="footer text-center mb-1 fs-5">
        <small>© <span id="currentYear"></span> Reuse+. Todos os direitos reservados.</small>
    </footer>

    <script src="Js/itens.js"></script>
    <script src="Js/app.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const itemId = parseInt(params.get("itemId"), 10);

        function getStoredItems() {
            return JSON.parse(localStorage.getItem("itens")) || [];
        }

        function saveStoredItems(items) {
            localStorage.setItem("itens", JSON.stringify(items));
        }

        const savedItems = getStoredItems();
        const fallbackItems = typeof itens !== "undefined" ? itens : [];
        const allItems = [
            ...savedItems,
            ...fallbackItems.filter(fi => !savedItems.some(si => si.id === fi.id))
        ].map(item => ({
            ...item,
            bids: item.bids || [],
            status: item.status || "disponível"
        }));

        const item = allItems.find(i => i.id === itemId);
        const itemInfo = document.getElementById("itemInfo");
        const selectQuantity = document.getElementById("selectQuantity");
        const quantityMessage = document.getElementById("quantityMessage");
        const selectOferta = document.getElementById("selectOferta");
        const offerValueGroup = document.getElementById("offerValueGroup");
        const offerValueInput = document.getElementById("offerValue");

        function formatMoney(value) {
            return Number(value || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
        }

        function getTotalUnits(item) {
            if (typeof item.quantidade === "number") {
                return item.quantidade;
            }
            const parsed = parseInt(item.quantidade, 10);
            return Number.isFinite(parsed) ? parsed : null;
        }

        function updateQuantityMessage(selectedValue) {
            if (!selectedValue) {
                quantityMessage.classList.add("d-none");
                return;
            }

            quantityMessage.textContent = selectedValue === "todos" ? `Selecionado todos (${item.quantidade}).` : `${parseInt(selectedValue, 10)} unidade(s) selecionada(s).`;
            quantityMessage.classList.remove("d-none");
        }

        function fillQuantityOptions(item) {
            const totalUnits = getTotalUnits(item);
            selectQuantity.innerHTML = `<option value="">Selecione a quantidade</option>`;
            const todosOption = document.createElement("option");
            todosOption.value = "todos";
            todosOption.textContent = "Todos";
            selectQuantity.appendChild(todosOption);

            if (totalUnits && totalUnits > 0) {
                for (let i = 1; i <= totalUnits; i += 1) {
                    const option = document.createElement("option");
                    option.value = String(i);
                    option.textContent = `${i} unidade(s)`;
                    selectQuantity.appendChild(option);
                }
            }
        }

        function updateOfferValueVisibility() {
            if (selectOferta.value === "retirar") {
                offerValueGroup.classList.add("d-none");
                offerValueInput.value = "";
            } else {
                offerValueGroup.classList.remove("d-none");
            }
        }

        if (item) {
            itemInfo.innerHTML = `
                <p><strong>Item:</strong> ${item.categoria} - ${item.descricao}</p>
                <p><strong>Quantidade:</strong> ${item.quantidade}</p>
                ${item.valor ? `<p><strong>Valor estimado:</strong> ${formatMoney(item.valor)}</p>` : ""}
                <p><strong>Endereço:</strong> ${item.endereco || item.local || "Não informado"}</p>
                <p><strong>Prazo de exibição:</strong> ${item.prazo || "Não informado"}</p>
                <p><strong>Status:</strong> ${item.status}</p>
            `;
            fillQuantityOptions(item);
            if (item.status !== "disponível") {
                document.getElementById("recebimentoForm").innerHTML = `<div class="alert alert-warning">Este item não está disponível para novas propostas no momento.</div>`;
            }
        } else {
            itemInfo.innerHTML = `
                <div class="alert alert-warning">Nenhum item selecionado. Volte à lista de itens e escolha um item.</div>
            `;
            selectQuantity.disabled = true;
            selectOferta.disabled = true;
            offerValueInput.disabled = true;
        }

        selectQuantity.addEventListener("change", () => {
            updateQuantityMessage(selectQuantity.value);
        });

        selectOferta.addEventListener("change", updateOfferValueVisibility);
        updateOfferValueVisibility();

        document.getElementById("recebimentoForm").addEventListener("submit", event => {
            event.preventDefault();
            if (!item || item.status !== "disponível") return;

            const selectedQuantity = selectQuantity.value;
            const proposalType = selectOferta.value;
            const proposalValue = Number(offerValueInput.value) || 0;

            if (!selectedQuantity || !proposalType) {
                return;
            }

            if (proposalType !== "retirar" && proposalValue <= 0) {
                alert("Informe um valor válido para a proposta.");
                return;
            }

            const bid = {
                id: Date.now(),
                type: proposalType,
                value: proposalType === "retirar" ? 0 : proposalValue,
                quantity: selectedQuantity,
                date: new Date().toISOString()
            };

            const storedItems = getStoredItems();
            const foundIndex = storedItems.findIndex(i => i.id === item.id);
            const updatedItem = {
                ...item,
                bids: [...(item.bids || []), bid],
                status: "em negociação"
            };

            if (foundIndex >= 0) {
                storedItems[foundIndex] = updatedItem;
            } else {
                storedItems.push(updatedItem);
            }

            saveStoredItems(storedItems);

            alert(`Proposta registrada com sucesso! Tipo: ${proposalType === "pago" ? "Pago" : proposalType === "retirar" ? "Retirar sem custo" : "Cobro para retirada"}`);
            window.location.href = "principal.html";
        });

        document.querySelectorAll(".navbar button").forEach(button => {
            button.addEventListener("click", () => {
                const href = button.getAttribute("href");
                if (href) window.location.href = href;
            });
        });
    </script>
</body>

</html>
