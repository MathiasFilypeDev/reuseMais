<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Reuse+</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/faveicon-reuseMais.png" type="image/x-icon">
</head>

<body class="bg-black text-white">

    <div class="navbar navbar-expand-lg justify-content-center navbar-dark bg-dark" id="navBar-cadastro">
        <button class="btn btn-outline-success m-1" href="index.html" id="btn-home">Home</button>
        <button class="btn btn-outline-light m-1" href="principal.html" id="btn-principal">Principal</button>
        <button class="btn btn-outline-info m-1" href="about.html" id="btn-sobre">Sobre</button>
    </div>

    <h2>Relatório</h2>
    <select id="tipoRelatorio">
        <option value="">Todos</option>
        <option value="entrada">Entradas</option>
        <option value="saida">Saídas</option>
    </select>
    <button onclick="consultarRelatorio(
      document.getElementById('tipoRelatorio').value
    )">Consultar</button>

    <table style="border: 1px solid #ccc;" id="tabelaRelatorio">
        <thead>
            <tr>
                <th>ID</th>
                <th>Tipo</th>
                <th>ItemId</th>
                <th>Quantidade</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <button onclick="consultarRelatorio('', 1)">Página 1</button>
    <button onclick="consultarRelatorio('', 2)">Página 2</button>
    <h2>Estatísticas</h2>
    <div id="estatisticas"></div>
    <button onclick="consultarEstatisticas()">Atualizar Estatísticas</button>
    
    <h2>Estatísticas</h2>
    <div id="estatisticas"></div>
    <button onclick="consultarEstatisticas()">Atualizar Estatísticas</button>

    <h2>Gráfico de Movimentações</h2>
    <canvas id="graficoMovimentacoes" width="400" height="200"></canvas>
    <button onclick="consultarEstatisticas()">Atualizar Gráfico</button>


</body>
<script src="Js/admin.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</html>
