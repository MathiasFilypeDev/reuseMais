<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadstro Itens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/faveicon-reuseMais.png" type="image/x-icon">
</head>

<body class="bg-light">

    <div class="navbar navbar-expand-lg justify-content-center navbar-dark bg-dark" id="navBar-cadastro">
        <button class="btn btn-outline-success mx-5" href="index.html" id="btn-home">Home</button>
        <button class="btn btn-outline-light mx-5" href="principal.html" id="btn-principal">Principal</button>
        <button class="btn btn-outline-info mx-5" href="about.html" id="btn-sobre">Sobre</button>
    </div>
    <main>
        <div class="container mt-5 text-center">
            <h2>Cadastra item</h2>
            <button type="button" id="btn-add-item"
                class="btn btn-success btn-lg rounded-circle d-flex align-items-center justify-content-center m-auto mb-4"
                style="width: 80px; height: 80px; font-size: 2.5rem;">-</button>
            <div id="itemFormContainer">
                <form id="formItens" class="form-group mt-4 p-4 border rounded text-start">
                    <div class="mb-3">
                        <label>Categoria</label>
                        <select class="form-control" name="categoria" id="categoriaSelect" required>
                            <option value="">Selecione uma categoria</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Descrição</label>
                        <textarea class="form-control" name="descricao" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label>Quantidade</label>
                        <input type="text" class="form-control" name="quantidade" required>
                    </div>
                    <div class="mb-3">
                        <label>Valor estimado (R$)</label>
                        <input type="number" class="form-control" name="valor" min="0" step="0.01" placeholder="0,00" required>
                    </div>
                    <div class="mb-3">
                        <label>Prazo de exibição</label>
                        <select class="form-control" name="prazo" id="prazoSelect" required>
                            <option value="">Selecione o prazo</option>
                            <option value="1">24 horas</option>
                            <option value="7">1 semana</option>
                            <option value="15">15 dias</option>
                            <option value="30">1 mês</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Endereço</label>
                        <input type="text" class="form-control" name="local" required>
                    </div>

                    <button type="submit" class="btn btn-success" id="buttonCadastro">Cadastrar Item</button>
                </form>
            </div>
        </div>
    </main>
    
    <footer class="footer text-center mb-1 fs-5">
        <small>© <span id="currentYear"></span> Reuse+. Todos os direitos reservados.</small>
    </footer>

    <script src="Js/app.js"></script>
    <script src="Js/cadastroItens.js"></script>

</body>

</html>
