<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/faveicon-reuseMais.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>Login - Reuse +</title>
</head>

<body class="bg-dark">

    <div class="navbar navbar-expand-lg navbar-dark bg-dark justify-content-center mb-4" id="navBar-home">
        <button class="btn btn-outline-success mx-5" href="index.html" id="btn-home">Home</button>
        <button class="btn btn-outline-light mx-5" href="principal.html" id="btn-principal">Principal</button>
        <button class="btn btn-outline-info mx-5" href="about.html" id="btn-sobre">Sobre</button>
    </div>

    <div class="container rounded-5 d-flex align-items-center justify-content-center mb-4" id="formLogin"
        style="max-width: 440px;">
        <div class="login-card p-5 rounded-4 w-100">
            <div class="text-center mb-4">
                <img src="assets/logo-reuseMais.png" alt="Reuse+" class="login-logo mb-3" style="max-width: 90px;">
                <h2 class="login-title mb-2">Login</h2>
            </div>
            <form id="formLogin" class="login-form">
                <div class="mb-3">
                    <label class="form-label font-weight-bold">Email/Usuário</label>
                    <input type="text" class="form-control" placeholder="Digite seu usuário" title="Digite seu usuário"
                        required>
                </div>
                <div class="mb-3">
                    <label class="form-label font-weight-bold">Senha</label>
                    <input type="password" class="form-control" placeholder="Digite sua senha" title="Digite sua senha"
                        required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100">Entrar</button>
                <p class="text-center text-white mb-1">Ainda não tem conta?</p>
                <a href="cadastro.html" class="d-block text-center text-info fs-6">Cadastre-se</a>
            </div>
            
            <div class="g_id_signin" data-type="standard"></div>
            
        </form>
        <div id="msgCadastro" class="mt-3"></div>
    </div>
</div>

<footer class="footer text-center mb-1 fs-5">
    <small>© <span id="currentYear"></span> Reuse+. Todos os direitos reservados.</small>
</footer>
</body>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="Js/app.js"></script>
<script src="Js/login.js"></script>

</html>
